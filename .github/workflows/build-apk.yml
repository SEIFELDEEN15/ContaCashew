name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          cd budget
          flutter clean
          flutter pub get

      - name: Patch missing namespace
        run: |
          FILE=$(find ~/.pub-cache -path "*flutter_charset_detector_android*/android/build.gradle" | head -n 1)
          if ! grep -q "namespace" "$FILE"; then
            sed -i '/android {/a\    namespace "com.example.flutter_charset_detector_android"' "$FILE"
          fi

      - name: Build APK
        run: |
          cd budget
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cashew-apk
          path: budget/build/app/outputs/flutter-apk/app-release.apk
