name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Doctor
        run: flutter doctor

      - name: Install dependencies
        run: |
          cd budget
          flutter clean
          flutter pub get

      - name: Increase Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m" >> budget/android/gradle.properties

      - name: Build APK
        run: |
          cd budget
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cashew-apk
          path: budget/build/app/outputs/flutter-apk/app-release.apk
